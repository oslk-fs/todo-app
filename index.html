<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do List</title>
</head>

<body>
    <main class="container">
        <header class="header">
            <h1 class="title"> Task Manager</h1>
            <h2 class="sub-title">Organize your day efficiently</h2>
        </header>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a task...">
            <button id="addBtn">Add +</button>
        </div>
        <div class="controls">
            <div class="filtres">
                <button data-filter="all" title="all tasks">All</button>
                <button data-filter="active" title="active tasks">Active</button>
                <button data-filter="completed" title="tasks completed">Completed</button>
            </div>
            <button id="clearBtn" title="clear all tasks">Clear</button>
        </div>
        <div class="controls-task"></div>
        <ul id="taskList"></ul>
    </main>
    <script src="app.js"></script>
</body>

</html>
